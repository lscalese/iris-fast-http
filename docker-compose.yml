services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ISC_CPF_MERGE_FILE=/home/irisowner/dev/merge.cpf
    #env_file:
    #  - .env
    ports:
      - 1972
      - 52773
      - 53773
    volumes:
      - ./:/home/irisowner/dev
    depends_on:
      - httpbin

  # A simple HTTP service used for integration testing of the FastHTTP class
  httpbin:
    image: kennethreitz/httpbin

  # A simple SSE server used for integration testing of the FastHTTP class
  sse-mock:
    image: python:3.9-slim
    volumes:
      - ./mock-server:/app
    working_dir: /app
    command: >
      sh -c "pip install flask && python sse_server.py"
